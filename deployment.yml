apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-checker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prime-checker
  template:
    metadata:
      labels:
        app: prime-checker
    spec:
      containers:
      - name: prime-checker
        image: your-docker-username/prime-app:latest
        ports:
        - containerPort: 8080
